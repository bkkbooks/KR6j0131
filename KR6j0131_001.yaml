body:
  text: 我今說無比力超勝世間出世間真言上上一切佛頂王佛頂輪王念誦儀則行者先當清淨於淨處安本尊像面西稽首禮受三歸捨身說罪受戒發菩提心隨喜勸請發願廻向已應結佛部三昧耶印四頂互內交二輪並合竪前附於蓋是名一切如來心印真言曰唵引一邇那匿而翼切二次結蓮華三昧耶印即前印左輪屈入掌中右輪如前竪是名蓮華部心印真言曰唵引一阿嚕力二次結金剛部三昧耶印即前蓮華部心印右輪屈入掌中左輪依前竪是名金剛部心印真言曰唵引一嚩日囉二合地力二合二次結甲冑印准根本印屈二蓋拄二光背印額右肩左肩心喉五處真言曰唵引一斫羯囉二合靺㗚底二合二鉢囉二合賒弭多三囉捺囉二合引囉捺囉二合引四婆去聲娑摩二合車盧瑟尼二合沙五囉乞沙二合囉乞沙二合𤚥六吽癹娑嚩二合合訶引七次結佛眼印二手合掌屈二蓋各拄光背二輪屈入掌印五處真言曰娜謨三漫多勃馱南一唵引二嚕嚕薩怖二合嚕三入嚩二合攞底瑟姹二合四悉馱盧者寧五薩嚩喇他二合娑達尼娑嚩二合引訶引六次結大海印二手內相叉仰掌擘開二輪右旋三匝想大海真言曰唵引一微摩盧娜地娑嚩二合引訶引二次於大海中想須彌盧山四寶所成二手內相叉急握豎拳真言曰唵引一阿者攞吽二次於須彌盧山上想寶樓閣加持寶樓閣印印二手金剛掌真言曰娜謨三漫多勃馱南引一唵薩嚩他欠二鄔娜哦二合帝薩頗二合囉呬引𤚥三哦哦那檢娑嚩二合訶引四次結佛頂輪王印二掌內相叉作拳竪二光屈上節如劍並竪二輪屈二蓋兩節相拄於二輪上印五處加護真言曰娜謨三漫多勃馱南一步嚕唵三合二次結網橛印准前根本印屈二蓋上節背不相著以二輪各壓上下揮轉即成結上下界真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三微枳囉拏微特防去聲二合娑尼四迦比羅貳縛里尼五怛囉二合娑耶六嚩日囉二合吠賒薩帝呶引囉特縛二合七能上聲瑟吒囉三合囉乞沙二合𤚥癹八次結牆印准前根本印屈二蓋兩節相逼平竪二輪附二蓋右旋三匝即成金剛牆界真言曰歸命同前噁引一莫壑二次結車輅印二手內相叉仰掌申二蓋令甲側相拄屈二輪拄蓋根下想於他方世界奉迎本尊真言曰唵引一覩嚕覩嚕吽二次結迎輅印准車輅印以二輪撥光頭向身三招真言曰發遣除羯哩灑二合耶加尾薩哩惹耶娜謨薩底哩野三合地尾二合迦南一怛他孽哆南二唵引三嚩日啷二合儗愚以切儞也二合羯哩灑耶娑嚩二合引訶引四次結迎請印准前根本印屈右蓋於光後向前三招真言曰娜謨婆誐嚩帝一阿鉢囉二合底呵覩瑟尼二合沙耶二翳呬翳二合娑誐刎三達麼囉惹平聲鉢囉二合底車鴟奚切南四遏鉗巘談補瑟貶逋諳切度貶同上末隣儞半者五滿遮避洛乞叉二合六阿鉢囉二合底呵多七麼囉鉢囉引羯囉二合麼耶娑嚩二合引訶引八次結一切辨事佛頂印二手內相叉竪二光如幢諸供養物及浴水洗淨土等並用此真言加持辟除去垢結界皆用此真言左旋辟除右旋結界真言曰娜謨三滿多勃馱南一唵引二吒嚕嚕二合三滿馱娑嚩二合引訶引四次重結前網橛印結上方界次結阿娑莽倪移枳切尼印側二手左掩右堅二輪右轉一匝即成密縫真言曰唵引一阿娑莽倪尼吽癹二次結獻閼伽印准前根本印屈二蓋相拄附二光竪二輪各附蓋根側真言曰娜謨三漫多勃馱南一唵引二閼伽囉訶三閼伽必哩二合野四鉢囉二合底車鴟奚切娜末鉗娑嚩二合引訶引五次重結根本印次結獻師子座印准前根本印屈二蓋於二輪甲側真言曰唵引一阿者囉尾囉耶娑嚩二合引訶引二次結塗香印准前根本印屈右蓋倚於右光下節真言曰娜謨三漫多勃馱南一唵引二怛嚟二合盧枳也二合獻馱孽帝三吽吽癹癹娑嚩二合引訶引四次結獻華印准前塗香印改左蓋倚右光下節真言曰娜謨三漫多勃馱南一唵引二薩嚩盧迦補瑟波二合步哆耶三吽吽癹癹娑嚩二合引訶引四次結燒香印准前根本印屈二蓋各倚於光下節真言曰娜謨三漫多勃馱南一唵引二尾囉孽哆微哦哆度麼耶三吽吽癹癹娑嚩二合引訶引四次結獻食印准前根本印屈二蓋上節各附於輪側真言曰娜謨三漫多勃馱南一唵引二薩嚩盧迦麼里必哩二合夜耶三吽吽癹癹娑嚩二合引訶引四次結獻燈明印准前根本印屈二蓋兩節令不相著二輪各附於蓋上真言曰娜謨三漫多勃馱南一唵引二薩嚩盧迦珊捺囉二合捨娜耶三吽吽癹癹娑嚩二合引訶引四次結普供養加持印二手虛心合掌五頂各兩節相交真言曰娜謨薩嚩勃馱冒地薩怛嚩二合南一唵引二薩嚩怛囉二合僧俱蘇弭多三避吉惹囉始那慕薩低娑嚩二合引訶引四次結遍照佛頂印二手內相叉合為拳令二光節微起真言曰娜謨三漫多勃馱南一噁引二莫含呼頷切三次結白傘蓋佛頂印二輪各捻二高甲上側相合二蓋屈如蓋形二光微屈相合二勝各竪相合真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三麼麼麼吽匿儞翼切四次結光聚佛頂印准前白傘蓋印坼開二蓋真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三怛他蘖都瑟尼二合沙四阿娜嚩盧枳多慕㗚馱二合五帝儒囉始吽六入嚩二合攞入嚩二合攞七馱迦馱迦八娜囉微娜囉九瞋那牝那吽吽癹癹娑嚩二合引訶引十次結高佛頂印准前白傘蓋印屈二蓋拄二光中節背真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三儞𭅤儞卑渝二合娜哦都瑟尼二合沙四吽吽癹癹娑嚩二合引訶引五次結勝佛頂印准高佛頂印移二蓋向上兩穬麥許真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三入嚩二合羅惹踰瑟尼二合沙四吽癹娑嚩二合引訶引五次結摧毀佛頂尾枳囉拏印二手內相叉作拳竪二光屈上節右光拄左光面令出半節許真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三尾枳囉那四度那度那犢引五次結摧碎佛頂印並准前改左光拄右光面亦出半節許真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三阿鉢囉二合底呵都瑟尼二合沙耶四薩嚩尾伽那二合尾持望二合娑那迦囉耶五怛嚧二合吒耶娑嚩二合引訶引六次結輪王佛頂心印准前根本印屈二蓋拄二光上節節上真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三怛他薩那瑟尼二合沙那嚩盧枳多四沒馱尼斫羯囉二合靺㗚底二合五吽入嚩二合羅入嚩二合羅六馱迦馱迦七度那微度那八怛囉二合娑耶麼囉逾瑳囉耶九呵那呵那十伴惹伴惹十一暗音𡳯鉢嚨二合十二企尼君吒哩尼十三阿鉢囉爾多薩怛囉馱哩尼十四吽癹娑嚩二合引訶引十五次結心中印准前根本印屈二蓋加於二光上節上真言曰娜謨三漫多勃馱南一阿鉢囉一合底呵多舍娑娜南二唵引三阿鉢囉引爾多特地翼切四普通諸佛頂印二手虛心金剛合掌如華在掌中行者若怱遽不能遍結諸佛頂印但結此印誦諸佛頂真言次結頂印准前根本印屈右蓋竪於右光後令不相著真言曰娜謨三漫多勃馱南一阿鉢囉二合底呵多舍娑娜南二唵引三斫羯囉二合靺㗚底二合唵吽四次結頭印准前根本印開二蓋各直竪於光後令不相著微屈真言曰歸命同前唵引一斫羯囉二合靺㗚底二合二吽癹娑嚩二合引訶引三次又結根本印次結大三昧耶印加護本尊二手內相叉竪二光屈二蓋於光後如鉤相去一穬麥許二輪各附蓋根下右旋三匝真言曰唵引一商羯哩二摩訶三昧鹽娑嚩二合引訶引三次誦一百八名讚歎欲念誦先以五支成本尊或五相成本尊瑜伽或於處處頂舌心也想一字頂輪成本尊坐八葉蓮華於一一葉上想七寶准前蓮華葉上想佛眼尊次應持珠此依菩提場所說經次持珠合掌捧珠誦清珠真言七遍真言曰唵引一阿娜步二合低尾惹曳而矣切二悉地悉馱囉梯娑嚩二合引訶引三次結持珠印二手各以輪捻高甲直竪二光二勝屈二蓋於光後令不相著如毘盧遮那經半金剛杵印真言曰娜謨婆誐嚩底一蘇悉第娑馱耶二悉馱囉梯娑嚩二合引訶引三次應淨其心如法而念誦持珠令當心繫心於鼻端字句分明呼不緩亦不急不頻伸噦嗌咳嗽與唾涕染等心相應及心緣苦受如是等過患皆不得成就當念誦時身心不得疲怠若勞倦即應結五供養印誦讚歎獻閼伽念誦畢持珠頂上次結前密縫印左轉一匝即成解界次結奉送印准前根本印左蓋外擲誦迎請真言除翳呬翳呬加孽車孽車句即成奉送次應復結牆及網橛等印加護處上下及所成就物次結計里枳里印左輪壓勝甲上餘三指頂坼開直竪如三股杵形右旋轉三匝成結界真言曰唵引一枳里枳里嚩日囉二合吽癹二次結軍吒利印二勝於掌中交屈二高壓以二輪壓高上竪二光相合屈二蓋於光後令一麥許不相著右旋三匝即成結界真言曰娜謨囉怛那二合怛囉二合夜耶一娜謨室戰二合拏嚩日囉二合波拏曳二摩訶藥乞叉二合細那波多曳三娜謨室戰二合拏嚩日囉二合句𡀔馱耶四唵引五虎嚕虎嚕六底瑟姹二合底瑟姹二合七滿馱滿馱八呵那呵那九阿蜜哩二合帝吽癹娑嚩二合引訶引十從一字真言至於十五字每計於字數一字一洛叉乃至三十字應誦三十洛叉應作先事法三十字已上應誦一萬遍
